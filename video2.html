<body>
  <h2>Big Ocean 빅오션 'One Man Army' Official MV</h2>

<div id="video-container"></div>

<script>
  const videoId = "HM7UMkgHPC4";
  const container = document.getElementById("video-container");
  const totalVideos = 50;
  const delay = 2000; // 2 seconds

  let count = 0;

  function addVideo() {
    if (count >= totalVideos) return;

    const iframe = document.createElement("iframe");
    iframe.width = "560";
    iframe.height = "315";
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1`;
    iframe.title = "YouTube video player";
    iframe.frameBorder = "0";
    iframe.allow =
      "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
    iframe.allowFullscreen = true;

    container.appendChild(iframe);

    count++;
    setTimeout(addVideo, delay); // schedule next video after 2s
  }

  // Start after 2 seconds
  setTimeout(addVideo, delay);
</script>
